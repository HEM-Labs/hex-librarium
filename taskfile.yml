version: '3'

tasks:
  default:
    cmds:
      - task -l

  # Project management

  update:
    desc: Update the repo from upstream
    cmds:
      - git pull

  version:
    desc:
      "Create a release tag (usage: task version -- 1.2.3)"
    vars:
      VERSION: '{{.CLI_ARGS}}'
    requires:
      vars: [ VERSION ]
    cmds:
      - git tag "v{{.VERSION}}"

  push:
    desc: Push the release tag to GitHub
    cmds:
      - git push && git push --tags
