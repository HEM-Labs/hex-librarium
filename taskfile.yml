version: '3'

tasks:
  default:
    cmds:
      - task -l
  update:
    desc: Update the repository
    cmds:
      - git pull

  volume:
    desc: Create the shared Librarium Docker volume if it does not exist
    cmds:
      - docker volume create hex-librarium

  librarium-init:
    desc: Build and run the Librarium volume initializer
    deps:
      - volume
    cmds:
      - docker compose run --rm --build librarium-init
